<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>HearWise</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect hack
      // Redirects all 404s back to index.html preserving the path
      // so React Router can handle /auth/callback and other routes
      var segmentCount = 1; // number of path segments in repo name
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>

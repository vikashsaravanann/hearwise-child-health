<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HearWise - Offline</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #000b1d;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        text-align: center;
      }
      .icon {
        font-size: 5rem;
        margin-bottom: 2rem;
        animation: pulse 2s infinite alternate;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        font-weight: 900;
        color: #e2e8f0;
      }
      p {
        font-size: 1rem;
        color: #94a3b8;
        max-width: 400px;
        line-height: 1.6;
        margin-bottom: 2rem;
        padding: 0 1rem;
      }
      button {
        background-color: #0d9488;
        color: white;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 9999px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #0f766e;
      }
      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(1.1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="icon">👂</div>
    <h1>You are offline</h1>
    <p>HearWise saves your test data locally and will sync when you reconnect.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </body>
</html>

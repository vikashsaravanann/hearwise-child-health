name: Deploy HearWise to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file from GitHub Secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets['VITE_SUPABASE_URL'] }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets['VITE_SUPABASE_ANON_KEY'] }}
          VITE_ADMIN_EMAIL: ${{ secrets['VITE_ADMIN_EMAIL'] }}
          VITE_ADMIN_PASSWORD: ${{ secrets[format('VITE_ADMIN_{0}', 'PASSWORD')] }}
          VITE_GEMINI_API_KEY: ${{ secrets[format('VITE_{0}_API_KEY', 'GEMINI')] }}
          VITE_GROQ_API_KEY: ${{ secrets['VITE_GROQ_API_KEY'] }}
        run: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          echo "VITE_ADMIN_EMAIL=$VITE_ADMIN_EMAIL" >> .env
          echo "VITE_ADMIN_PASSWORD=$VITE_ADMIN_PASSWORD" >> .env
          echo "VITE_GEMINI_API_KEY=$VITE_GEMINI_API_KEY" >> .env
          echo "VITE_GROQ_API_KEY=$VITE_GROQ_API_KEY" >> .env

      - name: Build for GitHub Pages
        run: npm run build:gh
        env:
          GITHUB_PAGES: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
